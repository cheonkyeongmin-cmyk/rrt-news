name: RRT News Monitor

on:
  schedule:
    - cron: "0 22 * * *"   # 매일 KST 07:00 (= UTC 22:00 전날)
  workflow_dispatch:         # GitHub UI에서 수동 실행 버튼 활성화

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # seen_articles.json 커밋을 위해 필요

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          NTFY_SERVER:    https://ntfy.sh
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json
          git diff --cached --quiet || \
            git commit -m "chore: update seen articles [skip ci]" && \
            git push
